<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>daydream — four UI directions</title>
<style>
  :root{
    --bg:#f6f3ec; --paper:#fbf9f3; --ink:#3a4a44; --sage:#5a7a6a;
    --sage-deep:#4a6a5a; --amber:#c8a06e; --line:#d8d2c2;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #fbf9f3 0%, var(--bg) 60%, #efe9dc 100%);
    color:var(--ink);
    font-family:Georgia,"Iowan Old Style",Palatino,serif;
    display:flex; flex-direction:column; min-height:100%;
  }
  header{
    display:flex; align-items:baseline; justify-content:space-between;
    gap:1rem; padding:14px 26px 6px;
  }
  header .brand{font-size:1.15rem; color:var(--sage-deep); letter-spacing:.02em;}
  header .brand b{font-weight:normal; color:var(--sage);}
  header .counter{
    font:0.78rem/1 system-ui,sans-serif; letter-spacing:.14em;
    text-transform:uppercase; color:var(--sage); opacity:.8;
  }
  .caption{ text-align:center; padding:2px 20px 8px; }
  .caption .name{ font-size:1.35rem; color:var(--sage-deep); }
  .caption .tag{ font-style:italic; color:var(--sage); opacity:.9; margin-top:2px; font-size:1rem;}
  .stage{
    flex:1 1 auto; display:flex; align-items:center; justify-content:center;
    padding:2px 26px; min-height:0;
  }
  .stage img{
    max-width:100%; max-height:100%;
    border-radius:14px;
    box-shadow:0 18px 50px -22px rgba(74,106,90,.55), 0 2px 10px rgba(74,106,90,.10);
    background:var(--paper);
  }
  .controls{
    display:flex; align-items:center; justify-content:center; gap:18px;
    padding:12px 20px 22px; flex-wrap:wrap;
  }
  button{
    font-family:inherit; color:var(--sage-deep); cursor:pointer;
    background:var(--paper); border:1px solid var(--line); border-radius:999px;
    padding:9px 18px; font-size:1rem; transition:all .15s ease;
    box-shadow:0 1px 3px rgba(74,106,90,.10);
  }
  button:hover{ border-color:var(--sage); }
  .arrow{ font-size:1.2rem; min-width:104px; }
  .dots{ display:flex; gap:9px; align-items:center; }
  .dot{
    width:12px; height:12px; border-radius:50%; padding:0; border:1px solid var(--sage);
    background:transparent;
  }
  .dot.active{ background:var(--amber); border-color:var(--amber); box-shadow:0 0 0 3px rgba(200,160,110,.22); }
  .seg{ display:inline-flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; background:var(--paper); }
  .seg button{ border:none; border-radius:0; box-shadow:none; padding:8px 16px; font-size:.92rem; }
  .seg button.on{ background:var(--sage-deep); color:var(--paper); }
  .hint{
    text-align:center; font:0.76rem/1.4 system-ui,sans-serif; letter-spacing:.04em;
    color:var(--sage); opacity:.7; padding:0 20px 14px;
  }
  .hint kbd{
    font-family:inherit; background:var(--paper); border:1px solid var(--line);
    border-radius:5px; padding:1px 6px; margin:0 1px;
  }
</style>
</head>
<body>
  <header>
    <div class="brand"><b>daydream</b> · four UI directions · the Stopped Clock</div>
    <div class="counter" id="counter">1 / 4</div>
  </header>

  <div class="caption">
    <div class="name" id="name">01 · The Reading Room</div>
    <div class="tag" id="tag">literary storybook — prose is the interface</div>
  </div>

  <div class="stage"><img id="shot" alt="" src=""></div>

  <div class="controls">
    <button class="arrow" id="prev">‹ prev</button>
    <div class="dots" id="dots"></div>
    <button class="arrow" id="next">next ›</button>
    <span class="seg">
      <button id="view-main" class="on">main</button>
      <button id="view-pack">backpack</button>
    </span>
  </div>

  <div class="hint">
    <kbd>←</kbd> <kbd>→</kbd> move between directions ·
    <kbd>b</kbd> or <kbd>↑</kbd><kbd>↓</kbd> toggle main / backpack ·
    <kbd>1</kbd>–<kbd>4</kbd> jump
  </div>

<script>
  const items = [
    {name:"01 · The Reading Room",  tag:"literary storybook — prose is the interface",
     main:"01-reading-room/reading-room.png",   pack:"01-reading-room/reading-room-backpack.png"},
    {name:"02 · The Diorama",       tag:"scene-as-interface — touch the painted world",
     main:"02-diorama/diorama.png",             pack:"02-diorama/diorama-backpack.png"},
    {name:"03 · The Companion Desk", tag:"two-pane desk — item cards + a living journal",
     main:"03-companion-desk/companion-desk.png", pack:"03-companion-desk/companion-desk-backpack.png"},
    {name:"04 · The Dream Pocket",  tag:"mobile, presence-forward — who's dreaming with you",
     main:"04-dream-pocket/dream-pocket.png",   pack:"04-dream-pocket/dream-pocket-backpack.png"},
  ];
  let i = 0, view = "main";

  const shot = document.getElementById("shot");
  const nameEl = document.getElementById("name");
  const tagEl = document.getElementById("tag");
  const counter = document.getElementById("counter");
  const vMain = document.getElementById("view-main");
  const vPack = document.getElementById("view-pack");
  const dotsEl = document.getElementById("dots");

  items.forEach((_, n) => {
    const d = document.createElement("button");
    d.className = "dot"; d.title = items[n].name;
    d.onclick = () => { i = n; render(); };
    dotsEl.appendChild(d);
  });
  const dots = [...dotsEl.children];

  function render(){
    const it = items[i];
    shot.src = view === "main" ? it.main : it.pack;
    shot.alt = it.name + (view === "pack" ? " — backpack" : "");
    nameEl.textContent = it.name;
    tagEl.textContent = it.tag;
    counter.textContent = (i+1) + " / " + items.length;
    vMain.classList.toggle("on", view === "main");
    vPack.classList.toggle("on", view === "pack");
    dots.forEach((d, n) => d.classList.toggle("active", n === i));
  }
  function go(delta){ i = (i + delta + items.length) % items.length; render(); }
  function setView(v){ view = v; render(); }

  document.getElementById("prev").onclick = () => go(-1);
  document.getElementById("next").onclick = () => go(1);
  vMain.onclick = () => setView("main");
  vPack.onclick = () => setView("pack");

  document.addEventListener("keydown", (e) => {
    if(e.key === "ArrowLeft"){ go(-1); }
    else if(e.key === "ArrowRight"){ go(1); }
    else if(e.key === "ArrowUp" || e.key === "ArrowDown" || e.key.toLowerCase() === "b"){
      setView(view === "main" ? "pack" : "main");
    }
    else if(e.key >= "1" && e.key <= String(items.length)){ i = (+e.key)-1; render(); }
  });

  render();
</script>
</body>
</html>
