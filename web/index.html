<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>daydream</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main id="app">
    <div id="dream-overlay" class="dream-overlay hidden" aria-live="polite"></div>
    <header id="room-header">
      <img id="room-bg" src="/assets/placeholder-meadow.png" alt="">
      <div id="painting-overlay" class="hidden" aria-live="polite">painting...</div>
      <h1 id="room-title">drifting...</h1>
    </header>
    <p id="room-desc" class="room-desc"></p>
    <section id="scene" aria-label="here">
      <section id="self-region" class="scene-region" aria-label="you are">
        <h2 class="region-label">you are</h2>
        <div id="self" class="region-body"></div>
      </section>
      <section id="here-region" class="scene-region" aria-label="here with you">
        <h2 class="region-label">here with you</h2>
        <div id="toons" class="region-body"></div>
      </section>
      <section id="ground-region" class="scene-region" aria-label="around you">
        <h2 class="region-label">around you</h2>
        <div id="things" class="region-body"></div>
      </section>
      <section id="carrying-region" class="scene-region" aria-label="you're carrying">
        <h2 class="region-label">you're carrying <button id="backpack-toggle" type="button" class="backpack-toggle" title="list what you're carrying">backpack</button></h2>
        <div id="inventory" class="region-body"></div>
      </section>
    </section>
    <section id="chat" aria-live="polite"></section>
    <form id="input-form">
      <input id="input-text" type="text" placeholder="speak, friend..." autofocus autocomplete="off" spellcheck="false">
    </form>
    <nav id="verb-bar" aria-label="actions"></nav>
    <nav id="skill-bar" aria-label="affordances"></nav>
    <nav id="exit-bar" aria-label="exits"></nav>
    <footer>
      <button id="slots-toggle" type="button" class="slots-toggle">switch toon</button>
      <button id="leave-dream" type="button" class="logout">leave the dream</button>
    </footer>
    <section id="slots-panel" class="slots-panel hidden" aria-label="toon slots">
      <h2>toon slots</h2>
      <ul id="slots-list"></ul>
      <button id="slots-close" type="button">close</button>
    </section>
  </main>
  <script src="/assets/main.js"></script>
</body>
</html>
